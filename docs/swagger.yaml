host: 127.0.0.1:8080
info:
  contact: {}
  description: This is a production-ready RESTful Todo API server written in Go.
  termsOfService: http://swagger.io
  title: Golang Todo API
  version: "1.0"
paths:
  /statistics:
    get:
      consumes:
      - application/json
      description: Get statistics for a specific author within a date range
      parameters:
      - description: Author ID
        in: query
        name: author_id
        required: true
        type: integer
      - description: Start date (YYYY-MM-DD)
        format: date
        in: query
        name: from
        required: true
        type: string
      - description: End date (YYYY-MM-DD)
        format: date
        in: query
        name: to
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: statistics successfully retrieved
          schema:
            $ref: '#/definitions/internal_features_statistics_transport_http.GetStatistics'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/github_com_Phirimhel_go-todo-app_internal_core_transport_http_response.ErrorResponse'
        "404":
          description: Statistics not found
          schema:
            $ref: '#/definitions/github_com_Phirimhel_go-todo-app_internal_core_transport_http_response.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/github_com_Phirimhel_go-todo-app_internal_core_transport_http_response.ErrorResponse'
      summary: Get statistics
      tags:
      - statistics
  /tasks:
    get:
      consumes:
      - application/json
      description: Get all tasks from the system
      parameters:
      - default: 10
        description: Max number of tasks to return
        in: query
        name: limit
        type: integer
      - default: 0
        description: Number of tasks to skip
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: List of tasks successfully retrieved
          schema:
            items:
              items:
                $ref: '#/definitions/internal_features_tasks_transport_http.TaskDtoResponse'
              type: array
            type: array
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/github_com_Phirimhel_go-todo-app_internal_core_transport_http_response.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/github_com_Phirimhel_go-todo-app_internal_core_transport_http_response.ErrorResponse'
      summary: Get list of []tasks
      tags:
      - tasks
    post:
      consumes:
      - application/json
      description: Create new task
      parameters:
      - description: Create task request body
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_features_tasks_transport_http.CreateTaskRequest'
      produces:
      - application/json
      responses:
        "201":
          description: task successfully created
          schema:
            $ref: '#/definitions/internal_features_tasks_transport_http.CreateTaskResponse'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/github_com_Phirimhel_go-todo-app_internal_core_transport_http_response.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/github_com_Phirimhel_go-todo-app_internal_core_transport_http_response.ErrorResponse'
      summary: Create taks
      tags:
      - tasks
  /tasks/{id}:
    delete:
      consumes:
      - application/json
      description: Delete task by ID
      parameters:
      - description: task ID to delete
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: task successfully deleted
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/github_com_Phirimhel_go-todo-app_internal_core_transport_http_response.ErrorResponse'
        "404":
          description: task not found
          schema:
            $ref: '#/definitions/github_com_Phirimhel_go-todo-app_internal_core_transport_http_response.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/github_com_Phirimhel_go-todo-app_internal_core_transport_http_response.ErrorResponse'
      summary: Delete task
      tags:
      - tasks
    get:
      consumes:
      - application/json
      description: Get task by ID
      parameters:
      - description: task ID to get
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: task successfully geted
          schema:
            $ref: '#/definitions/internal_features_tasks_transport_http.GetTaskResponse'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/github_com_Phirimhel_go-todo-app_internal_core_transport_http_response.ErrorResponse'
        "404":
